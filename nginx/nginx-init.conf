# Временная конфигурация для первичного получения SSL-сертификата.
# Используется ОДИН РАЗ скриптом init-letsencrypt.sh, затем заменяется на nginx.conf.

events {
    worker_connections 64;
}

http {
    server {
        listen 80;
        server_name av-wedding.soft-stack.ru;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 200 "Initializing SSL...";
            add_header Content-Type text/plain;
        }
    }
}
